version: "3.9"

services:
  api:
    build: .
    container_name: fake-review-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/fake_reviews
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: fake-review-db
    environment:
      POSTGRES_DB: fake_reviews
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
